<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScrollCatch</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <img class="brand-icon" src="../icons/icon-48.png" alt="">
        <div class="brand-copy">
          <p class="eyebrow">ScrollCatch · 收</p>
          <h1>收其全貌，存其有度。</h1>
          <p class="qidu-mark">A QIDU Utility</p>
        </div>
        <label class="locale-control">
          <span class="locale-label">界面语言</span>
          <select data-locale-select data-i18n-ignore aria-label="界面语言">
            <option value="en">English</option>
            <option value="zh-CN">中文</option>
          </select>
        </label>
      </header>

      <section class="actions" aria-label="截图操作">
        <button id="captureNow" class="primary-action" type="button">
          <span>截取完整页面</span>
          <small>从顶部开始，自动滚动并拼接</small>
        </button>
        <div class="secondary-actions">
          <button id="captureCurrent" type="button">
            <span>从当前位置</span>
            <small>继续向下捕获</small>
          </button>
          <button id="captureRange" type="button">
            <span>框选范围</span>
            <small>只保留需要的部分</small>
          </button>
        </div>
        <button id="stopCapture" class="stop-action" type="button" disabled>停止并保留已截内容 <kbd>Esc</kbd></button>
      </section>

      <p id="status" class="status" aria-live="polite">正在检查当前页面...</p>

      <details class="capture-guide">
        <summary>截图提示与快捷键</summary>
        <div class="guide-content">
          <p>PPT 预览会按左侧页码逐页捕获；普通网页按滚动位置拼接。</p>
          <p>图片很多的长页面，先滚到底部完成预加载会更稳。</p>
          <div class="shortcut-row"><kbd>Enter</kbd><span>选好起点后截到结尾</span></div>
          <div class="shortcut-row"><kbd>Esc</kbd><span>停止并保留已截内容</span></div>
          <div class="shortcut-row"><kbd>Alt+Shift+S</kbd><span>切到其他标签后停止</span></div>
        </div>
      </details>
    </main>

    <script src="../shared/i18n.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
