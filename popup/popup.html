<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XF FullPage Capture</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <p class="eyebrow">XF Capture</p>
        <h1>长网页截图</h1>
      </header>

      <section class="actions" aria-label="截图操作">
        <button id="captureNow" type="button">立即截图</button>
        <button id="captureCurrent" type="button">从当前位置开始截图</button>
        <button id="captureRange" type="button">自定义起点/终点</button>
        <button id="stopCapture" class="secondary" type="button" disabled>停止当前截图（Esc）</button>
      </section>

      <section class="notice" aria-label="截图提醒">
        <p>滚到目标位置后，可直接选择“从当前位置开始截图”。</p>
        <p>自定义范围里，点击页面正文或左下角按钮都可以标记起点/终点。</p>
        <p>选好起点后，按 <strong>Enter</strong> 可直接截到页面结束。</p>
        <p>截图中切到其他标签时会暂停等待；<strong>Alt+Shift+S</strong> 用来停止等待中的截图。</p>
      </section>

      <p id="status" class="status">选择截图方式。</p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
